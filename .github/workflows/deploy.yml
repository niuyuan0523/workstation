name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # 💡 关键修改 1：换成具体的系统版本，强制 GitHub 切换虚拟机机房，避开之前死活下载失败的网络节点
    runs-on: ubuntu-22.04
    steps:
      # 💡 关键修改 2：全部恢复为官方最标准的单数字大版本号，确保 GitHub 绝对能识别
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci
        working-directory: ./3d-display

      - name: Build 3D Display
        run: npm run build
        working-directory: ./3d-display

      - name: Prepare Deploy Files
        run: |
          mkdir -p build/3d-display
          cp index.html build/ || echo "Warning: index.html not found"
          cp projects.js build/ || echo "Warning: projects.js not found"
          cp -r 3d-display/dist/* build/3d-display/ || echo "Warning: dist folder not found"
          echo "Build complete!"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4