name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 显式指定使用 main 分支的 checkout
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci
        working-directory: ./3d-display

      - name: Build 3D Display
        run: npm run build
        working-directory: ./3d-display

      - name: Prepare Deploy Files
        run: |
          mkdir -p build/3d-display
          cp index.html build/ || echo "Warning: index.html not found"
          cp projects.js build/ || echo "Warning: projects.js not found"
          cp -r 3d-display/dist/* build/3d-display/ || echo "Warning: dist folder not found"
          echo "Build complete!"
          ls -la build/

      # 2. 显式指定使用 main 分支的上传和部署工具，绕过刚才报错的特定版本
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4