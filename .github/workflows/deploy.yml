name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # 配置目标仓库信息
  TARGET_REPO_OWNER: "${{ github.repository_owner }}"  # 当前仓库所有者（你自己）
  TARGET_REPO_NAME: "hive-ui-demo"                     # 目标仓库名称
  TARGET_RELEASE_TAG: "latest"                         # 使用最新的 Release
  TARGET_ASSET_NAME: "hive-ui-release.zip"             # 要下载的资产文件名（请根据实际调整）

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release Asset using PAT
        env:
          GH_TOKEN: ${{ secrets.DOWNLOAD_PAT }}
        run: |
          echo "Downloading release asset from ${TARGET_REPO_OWNER}/${TARGET_REPO_NAME}..."
          
          # 获取最新的 release 信息（latest 是特殊关键字）
          if [ "${TARGET_RELEASE_TAG}" = "latest" ]; then
            RELEASE_API="repos/${TARGET_REPO_OWNER}/${TARGET_REPO_NAME}/releases/latest"
          else
            RELEASE_API="repos/${TARGET_REPO_OWNER}/${TARGET_REPO_NAME}/releases/tags/${TARGET_RELEASE_TAG}"
          fi
          
          RELEASE_INFO=$(gh api ${RELEASE_API})
          
          # 输出所有可用的资产（方便调试）
          echo "========================================"
          echo "可用的资产文件列表："
          echo "$RELEASE_INFO" | jq -r '.assets[] | "  - \(.name) (大小: \(.size) bytes)"'
          echo "========================================"
          
          # 获取资产 ID
          ASSET_ID=$(echo $RELEASE_INFO | jq -r '.assets[] | select(.name == "'"${TARGET_ASSET_NAME}"'") | .id')
          
          if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" = "null" ]; then
            echo "Error: Asset '${TARGET_ASSET_NAME}' not found in release '${TARGET_RELEASE_TAG}'"
            echo "Available assets:"
            echo $RELEASE_INFO | jq -r '.assets[].name'
            exit 1
          fi
          
          echo "Found asset ID: ${ASSET_ID}"
          
          # 下载资产（使用重定向而不是 --output）
          gh api repos/${TARGET_REPO_OWNER}/${TARGET_REPO_NAME}/releases/assets/${ASSET_ID} \
            --header 'Accept: application/octet-stream' \
            > "./${TARGET_ASSET_NAME}"
          
          echo "Successfully downloaded ${TARGET_ASSET_NAME}"
          
          # 如果是 zip 文件，解压到 hive-ui 目录
          if [[ "${TARGET_ASSET_NAME}" == *.zip ]]; then
            mkdir -p hive-ui
            unzip -o "./${TARGET_ASSET_NAME}" -d hive-ui/
            echo "Extracted to hive-ui/"
          fi
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci
        working-directory: ./3d-display

      - name: Build 3D Display
        run: npm run build
        working-directory: ./3d-display

      - name: Prepare Deploy Files
        run: |
          # 创建目录结构
          mkdir -p build/3d-display
          
          # 1. 先复制 workstation 的根文件（index.html, projects.js）
          echo "Copying workstation files..."
          if [ -f "index.html" ]; then
            cp index.html build/
            echo "✓ Copied index.html"
          else
            echo "✗ Warning: index.html not found"
          fi
          
          if [ -f "projects.js" ]; then
            cp projects.js build/
            echo "✓ Copied projects.js"
          else
            echo "✗ Warning: projects.js not found"
          fi
          
          # 2. 复制 3d-display 构建产物
          if [ -d "3d-display/dist" ]; then
            cp -r 3d-display/dist/* build/3d-display/
            echo "✓ Copied 3d-display/dist/*"
          else
            echo "✗ Warning: 3d-display/dist folder not found"
          fi
          
          # 3. 最后复制 hive-ui 文件到 build/hive-ui/ 目录
          if [ -d "hive-ui" ] && [ "$(ls -A hive-ui 2>/dev/null)" ]; then
            mkdir -p build/hive-ui
            rsync -av --ignore-existing hive-ui/ build/hive-ui/
            echo "✓ Copied hive-ui files to build/hive-ui/"
            echo ""
            echo "hive-ui/ 目录内容:"
            ls -la hive-ui/
            echo ""
            echo "build/hive-ui/ 目录内容:"
            ls -la build/hive-ui/
          else
            echo "ℹ hive-ui folder is empty or not found, skipping"
            echo ""
            echo "当前目录内容:"
            ls -la
          fi
          
          # 显示最终的构建文件列表
          echo ""
          echo "========================================"
          echo "Final build/ contents:"
          find build/ -type f | head -50
          echo "========================================"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4