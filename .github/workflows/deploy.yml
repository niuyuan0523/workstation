name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # 允许手动触发工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './3d-display/package-lock.json'

      # --- 构建 3D 展示项目 ---
      - name: Install Dependencies
        run: npm ci
        working-directory: ./3d-display

      - name: Build 3D Display
        run: npm run build
        working-directory: ./3d-display

      # --- 准备部署目录 ---
      - name: Prepare Deploy Directory
        run: |
          # 创建部署目录
          mkdir -p deploy/3d-display
          
          # 复制主页面文件（无需构建）
          cp index.html deploy/
          cp projects.js deploy/
          
          # 复制 3D 展示项目的构建产物
          cp -r 3d-display/dist/* deploy/3d-display/
          
          # 显示部署目录结构
          echo "部署目录结构："
          ls -la deploy/
          echo "\n3d-display 目录："
          ls -la deploy/3d-display/

      # --- 上传构建产物 ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
