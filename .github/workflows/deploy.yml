name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 锁定具体版本 v4.1.6 
      - name: Checkout
        uses: actions/checkout@v4.1.6

      # 锁定具体版本 v4.0.5
      - name: Setup Node.js
        uses: actions/setup-node@v4.0.5
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci
        working-directory: ./3d-display

      - name: Build 3D Display
        run: npm run build
        working-directory: ./3d-display

      - name: Prepare Deploy Files
        run: |
          mkdir -p build/3d-display
          cp index.html build/ || echo "Warning: index.html not found"
          cp projects.js build/ || echo "Warning: projects.js not found"
          cp -r 3d-display/dist/* build/3d-display/ || echo "Warning: dist folder not found"
          echo "Build complete!"

      # 🔥 核心修改：锁定为已经极其成熟的 v3.4.0 版本，绝不给官方服务器现生成 SHA 的机会
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3.4.0
        with:
          path: './build'

      # 🔥 核心修改：锁定为已经极其成熟的 v4.0.5 版本
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5